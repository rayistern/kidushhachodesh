[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "npm start"
  port    = 8888

# Single-page-app fallback. Assets are referenced as /assets/* (root-relative)
# regardless of the URL the user is on, so the SPA works whether you visit
# the bare Netlify URL or any subpath like /kh that a reverse-proxy mounts it
# under (e.g. https://shluchimexchange.ai/kh — the proxy can rewrite or pass
# through; either way the browser fetches /assets/* from the document root).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
