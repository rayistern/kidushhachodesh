[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "npm start"
  port    = 8888

# This site is served behind a Vercel rewrite at https://shluchimexchange.ai/kh,
# so requests reaching Netlify keep the /kh prefix. Vite is configured with
# base = '/kh/', so built assets are referenced as /kh/assets/*.
# Map the /kh-prefixed requests to the actual files in dist/.

[[redirects]]
  from = "/kh/assets/*"
  to = "/assets/:splat"
  status = 200

[[redirects]]
  from = "/kh"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/kh/*"
  to = "/index.html"
  status = 200

# Fallback for direct Netlify access (no /kh prefix): also serve the SPA.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
