[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "npm start"
  port    = 8888

# Vite is built with base='/kh/' AND outDir='dist/kh', so the actual files
# live at dist/kh/index.html and dist/kh/assets/*. With publish='dist', those
# files are served at the URL paths /kh/index.html and /kh/assets/* — exactly
# what the asset references in index.html ask for. No rewrites needed for
# the asset hops.
#
# We only need a SPA fallback so that visiting /kh (no slash), the bare
# Netlify URL (/), or any unknown path drops the user onto the SPA shell.

[[redirects]]
  from = "/kh"
  to = "/kh/index.html"
  status = 200

[[redirects]]
  from = "/kh/*"
  to = "/kh/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/kh/index.html"
  status = 200
