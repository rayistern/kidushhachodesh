[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "npm start"
  port    = 8888

# Vite is built with base='/kh/' so the SPA can be served behind a
# /kh path-prefix proxy at shluchimexchange.ai/kh. Built assets are
# referenced in index.html as /kh/assets/* but the actual files live
# in dist/assets/* — rewrite the prefix away so Netlify can find them.
[[redirects]]
  from = "/kh/assets/*"
  to = "/assets/:splat"
  status = 200

# SPA fallback for any /kh path: serve dist/index.html directly.
[[redirects]]
  from = "/kh"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/kh/*"
  to = "/index.html"
  status = 200

# When the bare Netlify URL is hit, bounce to /kh/ so the asset paths
# referenced inside index.html (which start with /kh/) actually resolve.
[[redirects]]
  from = "/"
  to = "/kh/"
  status = 302

[[redirects]]
  from = "/*"
  to = "/kh/"
  status = 302
